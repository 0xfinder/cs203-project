spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: app
  datasource:
    # Fallback to in-memory H2 for local development if SUPABASE env vars are not set
    url: ${SUPABASE_DB_URL:jdbc:h2:mem:dev;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${SUPABASE_DB_USERNAME:sa}
    password: ${SUPABASE_DB_PASSWORD:}
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0
      max-lifetime: 300000
      idle-timeout: 60000
      data-source-properties:
        prepareThreshold: 0
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${SUPABASE_JWK_SET_URI}
          jws-algorithms: ${SUPABASE_JWS_ALGORITHMS:ES256}
  jpa:
    hibernate:
      # Use 'update' by default to allow schema creation in local dev H2 fallback
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    open-in-view: false

server:
  error:
    include-message: always

openai:
  api-key: ${OPENAI_API_KEY:}
  moderation:
    enabled: ${OPENAI_MODERATION_ENABLED:true}
