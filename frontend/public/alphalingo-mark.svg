<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">AlphaLingo logo</title>
  <desc id="desc">
    Warm rounded tile with a playful A monogram and a small chat bubble accent.
  </desc>
  <defs>
    <linearGradient id="tile" x1="18" y1="12" x2="112" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8EE" />
      <stop offset="1" stop-color="#F4E2D1" />
    </linearGradient>
    <linearGradient id="glow" x1="30" y1="24" x2="98" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFE2A4" />
      <stop offset="0.52" stop-color="#ED9A72" />
      <stop offset="1" stop-color="#D86D58" />
    </linearGradient>
    <linearGradient id="bubble" x1="78" y1="24" x2="106" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EDF8EF" />
      <stop offset="1" stop-color="#BDE3C3" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#D86D58" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect
    x="10"
    y="10"
    width="108"
    height="108"
    rx="30"
    fill="url(#tile)"
    stroke="#E9D7C7"
    stroke-width="3"
  />

  <circle cx="37" cy="34" r="13" fill="#FFF7D8" opacity="0.85" />
  <circle cx="90" cy="95" r="16" fill="#FFFFFF" opacity="0.42" />

  <g filter="url(#shadow)">
    <circle cx="62" cy="68" r="34" fill="#FFFDF7" stroke="#F0DECF" stroke-width="2.5" />
    <path
      d="M46 88 L62 46 L79 88 M52 69 H72"
      fill="none"
      stroke="url(#glow)"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="11"
    />
  </g>

  <path
    d="M78 33C78 24.163 85.163 17 94 17C102.837 17 110 24.163 110 33C110 41.837 102.837 49 94 49H90L84 55V48.2C80.461 45.46 78 39.575 78 33Z"
    fill="url(#bubble)"
    stroke="#D5E8D8"
    stroke-width="2.5"
  />
  <circle cx="89" cy="33" r="3" fill="#7AB386" />
  <circle cx="95" cy="33" r="3" fill="#7AB386" />
  <circle cx="101" cy="33" r="3" fill="#7AB386" />
</svg>
